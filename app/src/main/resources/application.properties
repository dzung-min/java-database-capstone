spring.application.name=back-end
# Connection URL (format: jdbc:mysql://[host]:[port]/[database_name])
spring.datasource.url=jdbc:mysql://localhost:3306/cms

# Database Credentials
spring.datasource.username=user
spring.datasource.password=pass
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.data.mongodb.uri=mongodb://user:pass@localhost:27017/prescriptions

# management.endpoint.health.show-details=always
# management.health.db.enabled=true


# api.path=/
# jwt.secret=$!@#$^%$$$%####$DDCPN0234FCFDPD8670M



spring.web.resources.static-locations=classpath:/static/

# -------------------------
# Thymeleaf Configuration
# -------------------------
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false    
spring.thymeleaf.encoding=UTF-8